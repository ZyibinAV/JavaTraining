services:

  postgres:
    image: postgres:16
    container_name: javatraining-postgres
    environment:
      POSTGRES_DB: javatraining
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/volumes/postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: javatraining-minio
    command: server /data --console-address ":8061"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "8060:9000"
      - "8061:8061"
    volumes:
      - ./docker/volumes/minio:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: javatraining-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: javatraining-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"