spring:
  application:
    name: JavaTraining

  datasource:
    url: jdbc:postgresql://localhost:5432/javatraining
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user, user:email
      resourceserver:
        jwt:
          jwk-set-uri:

  messages:
    basename: messages
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    com.homeapp.javatraining: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG

jwt:
  secret: "dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIEphdmFUcmFpbmluZyBhcHBsaWNhdGlvbiBmb3IgSldUIHRva2VuIGdlbmVyYXRpb24="
  expiration: 900000
  refresh-expiration: 2592000000

cookie:
  secure: false

minio:
  endpoint: http://localhost:8060
  access-key: minioadmin
  secret-key: minioadmin
  bucket: avatars