<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Редактирование вопроса</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">Редактирование вопроса</h1>
            <a th:href="@{'/admin/tests/' + ${topicCode} + '/questions'}" class="btn btn-link">Назад</a>
        </div>
        <div class="card" style="max-width:700px;">
            <form th:action="@{'/admin/tests/' + ${topicCode} + '/questions/' + ${question.id()} + '/edit'}" method="post" class="form">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="questionText" class="form-label">Текст вопроса</label>
                    <input type="text" id="questionText" name="questionText" class="form-input"
                           th:value="${question.questionText()}" required maxlength="500">
                </div>
                <div class="form-group">
                    <label class="form-label">Ответы</label>
                    <div id="answersContainer">
                        <div th:each="answer : ${question.answers()}" class="answer-row" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                            <input type="text" name="answerText" class="form-input"
                                   th:value="${answer.text()}" required style="flex:1;">
                            <label style="white-space:nowrap;font-size:.9rem;">
                                <input type="radio" name="correctAnswerIndex"
                                       th:value="${answer.index}"
                                       th:checked="${answer.index == question.correctAnswerIndex()}" required>
                                Правильный
                            </label>
                            <button type="button" class="btn btn-sm btn-danger" onclick="this.parentElement.remove()" title="Удалить ответ">X</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-sm btn-link" onclick="addAnswer()" style="margin-top:4px;">+ Добавить ответ</button>
                </div>
                <div class="profile-actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a th:href="@{'/admin/tests/' + ${topicCode} + '/questions'}" class="btn btn-link">Отмена</a>
                </div>
            </form>
        </div>
    </div>

    <div layout:fragment="scripts">
        <script>
            function addAnswer() {
                var container = document.getElementById('answersContainer');
                var count = container.children.length;
                var row = document.createElement('div');
                row.className = 'answer-row';
                row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;';
                row.innerHTML = '<input type="text" name="answerText" class="form-input" required style="flex:1;">' +
                    '<label style="white-space:nowrap;font-size:.9rem;">' +
                    '<input type="radio" name="correctAnswerIndex" value="' + count + '" required> Правильный' +
                    '</label>' +
                    '<button type="button" class="btn btn-sm btn-danger" onclick="this.parentElement.remove()" title="Удалить ответ">X</button>';
                container.appendChild(row);
            }
        </script>
    </div>
</body>
</html>
