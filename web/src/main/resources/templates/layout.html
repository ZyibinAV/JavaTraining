<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE — $LAYOUT_TITLE">JavaTraining</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-inner">
            <a href="/" class="navbar-brand">JavaTraining</a>
            <nav class="navbar-links">
                <a th:if="${#authorization.expression('isAuthenticated()')}" href="/" class="nav-link">Главная</a>
                <a th:if="${#authorization.expression('isAuthenticated()')}" href="/profile" class="nav-link">Профиль</a>
                <a th:if="${#authorization.expression('isAuthenticated()')}" href="/test/settings" class="nav-link">Тест</a>
                <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/admin" class="nav-link nav-admin">Админка</a>
                <a th:if="${#authorization.expression('!isAuthenticated()')}" href="/login" class="nav-link">Вход</a>
                <a th:if="${#authorization.expression('!isAuthenticated()')}" href="/register" class="nav-link">Регистрация</a>
                <form th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{/logout}" method="post" class="nav-logout-form">
                    <button type="submit" class="btn btn-link nav-link">Выйти</button>
                </form>
            </nav>
        </div>
    </header>

    <main class="container main-content" layout:fragment="content">
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 JavaTraining. Учебный проект.</p>
        </div>
    </footer>

    <div layout:fragment="scripts"></div>
</body>
</html>
