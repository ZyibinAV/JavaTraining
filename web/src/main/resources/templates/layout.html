<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE — $LAYOUT_TITLE">JavaTraining</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-inner">
            <a href="/" class="navbar-brand">JavaTraining</a>
            <nav class="navbar-links">
                <a th:if="${#authorization.expression('isAuthenticated()')}" href="/" class="nav-link">Главная</a>
                <a th:if="${#authorization.expression('isAuthenticated()')}" href="/test/settings" class="nav-link">Тест</a>
                <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/admin" class="nav-link nav-admin">Админка</a>
            </nav>
            <div th:if="${#authorization.expression('!isAuthenticated()')}" class="navbar-auth">
                <a href="/login" class="nav-link">Вход</a>
                <a href="/register" class="nav-link">Регистрация</a>
            </div>
            <div th:if="${currentUser != null}" class="navbar-user">
                <a href="/profile" class="user-badge">
                    <img th:src="@{${currentUser.avatarPath()}}" alt="avatar" class="user-avatar-small">
                    <span class="user-name" th:text="${currentUser.nickname() ?: currentUser.username()}">user</span>
                </a>
                <form th:action="@{/logout}" method="post" class="nav-logout-form">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-link nav-link">Выйти</button>
                </form>
            </div>
        </div>
    </header>

    <main class="container main-content" layout:fragment="content">
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 JavaTraining. Учебный проект.</p>
        </div>
    </footer>

    <div layout:fragment="scripts"></div>
</body>
</html>
