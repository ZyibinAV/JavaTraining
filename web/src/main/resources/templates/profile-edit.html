<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Редактирование профиля</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">Редактирование профиля</h1>
        </div>
        <div class="card" style="max-width:500px;">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <form th:action="@{/profile/edit}" method="post" class="form">
                <div class="form-group">
                    <label for="nickname" class="form-label">Псевдоним</label>
                    <input type="text" id="nickname" name="nickname" class="form-input"
                           th:value="${profile.nickname()}" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="about" class="form-label">О себе</label>
                    <textarea id="about" name="about" class="form-textarea"
                              maxlength="500" th:text="${profile.about()}"></textarea>
                </div>
                <div class="profile-actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="/profile" class="btn btn-link">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
