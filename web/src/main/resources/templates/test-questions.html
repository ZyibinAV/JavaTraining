<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Вопросы темы</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">Вопросы: <span th:text="${topicCode}">java-core</span></h1>
            <a href="/admin/tests" class="btn btn-link">К темам</a>
        </div>
        <div th:if="${#lists.isEmpty(questions)}" class="card text-center">
            <p class="text-muted">Вопросов пока нет.</p>
        </div>
        <div th:if="${!#lists.isEmpty(questions)}">
            <div class="card" th:each="question : ${questions}" style="margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
                    <div style="flex:1;">
                        <p style="font-weight:600;margin-bottom:8px;" th:text="${question.questionText()}">Question text</p>
                        <ul style="list-style:none;padding:0;">
                            <li th:each="answer : ${question.answers()}"
                                style="padding:4px 0;font-size:.9rem;"
                                th:classappend="${answer.index() == question.correctAnswerIndex()} ? 'text-success' : 'text-muted'"
                                th:text="${answer.index() + 1} + '. ' + ${answer.text()}">1. Answer</li>
                        </ul>
                    </div>
                    <form th:action="@{'/admin/tests/' + ${topicCode} + '/questions/' + ${question.id()} + '/delete'}" method="post" class="inline-form" onsubmit="return confirm('Удалить вопрос?')">
                        <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
