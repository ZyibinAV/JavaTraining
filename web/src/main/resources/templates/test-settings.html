<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Настройки теста</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">Настройки теста</h1>
        </div>
        <div class="card" style="max-width:500px;">
            <div th:if="${error}" class="alert alert-error" th:text="${error}" style="text-align:center;"></div>
            <form th:action="@{/test/settings}" method="post" class="form">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label class="form-label">Выберите темы</label>
                    <div class="checkbox-group" id="checkboxGroup">
                        <label th:each="topic : ${topics}" class="checkbox-label">
                            <input type="checkbox" th:name="topics" th:value="${topic.code()}" class="topic-checkbox">
                            <span th:text="${topic.displayName()}">Topic</span>
                        </label>
                    </div>
                    <p id="multiTopicNotice" class="text-muted" style="display:none;font-size:.8rem;margin-top:-12px;margin-bottom:16px;">
                        Комбинированные тесты (несколько тем) не учитываются в статистике по темам на странице результатов.
                    </p>
                    <script>
                        document.getElementById('checkboxGroup').addEventListener('change', function() {
                            var checked = document.querySelectorAll('.topic-checkbox:checked').length;
                            var notice = document.getElementById('multiTopicNotice');
                            notice.style.display = checked > 1 ? 'block' : 'none';
                        });
                    </script>
                </div>
                <div class="form-group">
                    <label for="questionCount" class="form-label">Количество вопросов</label>
                    <select id="questionCount" name="questionCount" class="form-input">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Начать тест</button>
            </form>
        </div>
    </div>
</body>
</html>
