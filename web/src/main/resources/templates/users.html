<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Пользователи</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">Управление пользователями</h1>
            <a href="/admin" class="btn btn-link">Назад</a>
        </div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}" style="text-align:center;"></div>
        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя</th>
                            <th>Email</th>
                            <th>Роль</th>
                            <th>Статус</th>
                            <th>Дата</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id()}">1</td>
                            <td>
                                <span th:text="${user.username()}">user</span>
                                <span th:if="${user.nickname() != null}" class="text-muted" th:text="'(' + ${user.nickname()} + ')'">(nick)</span>
                            </td>
                            <td th:text="${user.email()}">email</td>
                            <td>
                                <span th:if="${user.role().name() == 'ADMIN'}" class="badge badge-admin" th:text="${user.role().name()}">ADMIN</span>
                                <span th:if="${user.role().name() != 'ADMIN'}" class="badge badge-user" th:text="${user.role().name()}">USER</span>
                            </td>
                            <td>
                                <span th:if="${user.blocked()}" class="badge badge-failed">Заблокирован</span>
                                <span th:if="${!user.blocked()}" class="badge badge-passed">Активен</span>
                            </td>
                            <td th:text="${#temporals.format(user.createdAt(), 'dd.MM.yyyy')}">01.01.2026</td>
                            <td>
                                <div class="table-actions">
                                    <form th:action="@{'/admin/users/' + ${user.id()} + '/block'}" method="post" class="inline-form" th:data-username="${user.username()}" th:data-blocked="${user.blocked()}" onsubmit="var u=this.dataset.username;return confirm(this.dataset.blocked==='true'?'Разблокировать пользователя '+u+'?':'Заблокировать пользователя '+u+'?')">
                                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" th:class="'btn btn-sm ' + (${user.blocked()} ? 'btn-primary' : 'btn-danger')" th:text="${user.blocked()} ? 'Разблокировать' : 'Заблокировать'">Block</button>
                                    </form>
                                    <form th:action="@{'/admin/users/' + ${user.id()} + '/role'}" method="post" class="inline-form">
                                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <select name="role" class="form-select" style="width:auto;padding:6px 8px;font-size:.85rem;" onchange="this.form.submit()">
                                            <option value="USER" th:selected="${user.role().name() == 'USER'}">USER</option>
                                            <option value="ADMIN" th:selected="${user.role().name() == 'ADMIN'}">ADMIN</option>
                                        </select>
                                    </form>
                                    <form th:action="@{'/admin/users/' + ${user.id()} + '/delete'}" method="post" class="inline-form" th:data-username="${user.username()}" onsubmit="return confirm('Удалить пользователя '+this.dataset.username+'?')">
                                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
