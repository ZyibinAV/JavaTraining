<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Регистрация</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="auth-page">
            <div class="card auth-card">
                <h1 class="card-title">Регистрация</h1>

                <div th:if="${error}" class="alert alert-error" th:text="${error}" style="text-align:center;"></div>

                <form th:action="@{/register}" method="post" class="form">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-group">
                        <label for="username" class="form-label">Имя пользователя</label>
                        <input type="text" id="username" name="username" class="form-input" required autofocus
                               minlength="3" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" id="password" name="password" class="form-input" required
                               minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
                </form>

                <p class="auth-footer">
                    Уже есть аккаунт? <a href="/login">Войти</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
