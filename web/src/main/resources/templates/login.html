<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Вход</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="auth-page">
            <div class="card auth-card">
                <h1 class="card-title">Вход в JavaTraining</h1>

                <div th:if="${param.error}" class="alert alert-error">
                    Неверное имя пользователя или пароль.
                </div>
                <div th:if="${param.logout}" class="alert alert-info">
                    Вы вышли из системы.
                </div>

                <form th:action="@{/login}" method="post" class="form">
                    <div class="form-group">
                        <label for="username" class="form-label">Имя пользователя</label>
                        <input type="text" id="username" name="username" class="form-input" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" id="password" name="password" class="form-input" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Войти</button>
                </form>

                <div class="auth-divider">
                    <span>или</span>
                </div>

                <a href="/oauth2/authorization/github" class="btn btn-github btn-full">Войти через GitHub</a>

                <p class="auth-footer">
                    Нет аккаунта? <a href="/register">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
