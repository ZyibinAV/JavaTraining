<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Профиль</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">Профиль</h1>
        </div>
        <div class="card profile-card">
            <div>
                <img th:if="${profile.avatarPath() != null}" th:src="@{${profile.avatarPath()}}" alt="Avatar" class="profile-avatar">
                <div th:if="${profile.avatarPath() == null}" class="profile-avatar" style="background:var(--color-bg);display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--color-text-secondary);">
                    <span th:text="${#strings.substring(profile.username(), 0, 1)}">U</span>
                </div>
            </div>
            <div class="profile-info">
                <p><span class="profile-label">Имя пользователя</span><br><span th:text="${profile.username()}">username</span></p>
                <p><span class="profile-label">Email</span><br><span th:text="${profile.email()}">email</span></p>
                <p><span class="profile-label">Псевдоним</span><br><span th:text="${profile.nickname() != null ? profile.nickname() : profile.username()}">nickname</span></p>
                <p th:if="${profile.about() != null}"><span class="profile-label">О себе</span><br><span th:text="${profile.about()}">about</span></p>
                <p><span class="profile-label">Роль</span><br>
                    <span th:if="${profile.role() == 'ADMIN'}" class="badge badge-admin" th:text="${profile.role()}">ADMIN</span>
                    <span th:if="${profile.role() != 'ADMIN'}" class="badge badge-user" th:text="${profile.role()}">USER</span>
                </p>
                <p><span class="profile-label">Зарегистрирован</span><br><span th:text="${#temporals.format(profile.createdAt(), 'dd.MM.yyyy HH:mm')}">date</span></p>
                <div class="profile-actions">
                    <a href="/profile/edit" class="btn btn-primary">Редактировать</a>
                    <a href="/profile/avatar" class="btn btn-link">Сменить аватар</a>
                    <a href="/profile/password" class="btn btn-link">Сменить пароль</a>
                    <a href="/" class="btn btn-link">На главную</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
