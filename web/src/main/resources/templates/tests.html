<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Темы тестов</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">Управление темами</h1>
            <a href="/admin" class="btn btn-link">Назад</a>
        </div>
        <div class="card mb-4">
            <h2 class="card-title" style="font-size:1.1rem;">Добавить тему</h2>
            <form th:action="@{/admin/tests/create}" method="post" class="form-inline">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <input type="text" name="code" class="form-input" placeholder="Код (напр. java-core)" required>
                </div>
                <div class="form-group">
                    <input type="text" name="displayName" class="form-input" placeholder="Название (напр. Java Core)" required>
                </div>
                <button type="submit" class="btn btn-primary">Создать</button>
            </form>
        </div>
        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Код</th>
                            <th>Название</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="topic : ${topics}">
                            <td th:text="${topic.code()}">java-core</td>
                            <td th:text="${topic.displayName()}">Java Core</td>
                            <td>
                                <div class="table-actions">
                                    <a th:href="@{'/admin/tests/' + ${topic.code()} + '/questions'}" class="btn btn-sm btn-primary">Вопросы</a>
                                    <form th:action="@{'/admin/tests/' + ${topic.code()} + '/delete'}" method="post" class="inline-form" onsubmit="return confirm('Удалить тему ' + '${topic.displayName()}' + '?')">
                                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
