<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Статистика</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">Статистика</h1>
            <a href="/admin" class="btn btn-link">Назад</a>
        </div>
        <div class="admin-grid">
            <div class="card stat-card">
                <div class="stat-value" th:text="${statistics.totalTests}">0</div>
                <div class="stat-label">Всего тестов</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" th:text="${statistics.passedTests}">0</div>
                <div class="stat-label">Пройдено</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" th:text="${statistics.totalTests - statistics.passedTests}">0</div>
                <div class="stat-label">Не пройдено</div>
            </div>
            <div class="card stat-card">
                <div class="stat-value" th:text="${statistics.totalTests > 0 ? #numbers.formatDecimal(statistics.passedTests * 100.0 / statistics.totalTests, 1, 1) : '0'} + '%'">75%</div>
                <div class="stat-label">Успешность</div>
            </div>
        </div>
        <div class="card mb-4">
            <h2 class="card-title" style="font-size:1.1rem;">По пользователям</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Пользователь</th>
                            <th>Тестов</th>
                            <th>Пройдено</th>
                            <th>Успешность</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="us : ${statistics.userStats}">
                            <td th:text="${us.username}">user</td>
                            <td th:text="${us.total}">0</td>
                            <td th:text="${us.passed}">0</td>
                            <td th:text="${us.successRate} + '%'">75%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card">
            <h2 class="card-title" style="font-size:1.1rem;">По темам</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Тема</th>
                            <th>Тестов</th>
                            <th>Пройдено</th>
                            <th>Успешность</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ts : ${statistics.topicStats}">
                            <td th:text="${ts.topicDisplayName}">Java Core</td>
                            <td th:text="${ts.total}">0</td>
                            <td th:text="${ts.passed}">0</td>
                            <td th:text="${ts.successRate} + '%'">75%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
