<!DOCTYPE html>
<html xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">
<head>
    <title>Смена пароля</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">Смена пароля</h1>
        </div>
        <div class="card" style="max-width:500px;">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <form th:action="@{/profile/password}" method="post" class="form">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="currentPassword" class="form-label">Текущий пароль</label>
                    <input type="password" id="currentPassword" name="currentPassword" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="newPassword" class="form-label">Новый пароль</label>
                    <input type="password" id="newPassword" name="newPassword" class="form-input" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Подтвердите пароль</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" required minlength="6">
                </div>
                <div class="profile-actions">
                    <button type="submit" class="btn btn-primary">Сменить пароль</button>
                    <a href="/profile" class="btn btn-link">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
